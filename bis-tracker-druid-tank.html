<title>Druid Pre-Raid BiS Tracker — All Specs</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card-hover: #1a2745;
    --border: #0f3460;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --gold: #ffd700;
    --green: #4caf50;
    --blue: #5090d0;
    --epic: #a335ee;
    --rare: #0070dd;
    --uncommon: #1eff00;
    --checked-bg: #0d2a1a;
    --checked-border: #1b5e20;
    --orange: #ff8000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 920px;
    margin: 0 auto;
  }
  h1 { text-align: center; color: var(--orange); margin-bottom: 4px; font-size: 1.6em; }
  .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 20px; font-size: 0.85em; }
  .subtitle a { color: var(--text-dim); }
  .progress-bar {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; margin-bottom: 20px; text-align: center;
  }
  .progress-bar .bar-wrap { background: #0a0a1a; border-radius: 4px; height: 20px; margin-top: 8px; overflow: hidden; }
  .progress-bar .bar-fill { background: linear-gradient(90deg, var(--green), #66bb6a); height: 100%; transition: width 0.3s; border-radius: 4px; }
  .progress-text { color: var(--gold); font-weight: 600; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; justify-content: center; }
  .filters button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8em; transition: all 0.15s;
  }
  .filters button:hover { background: var(--card-hover); }
  .filters button.active { border-color: var(--gold); color: var(--gold); }
  .spec-filters { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
  .spec-filters button {
    background: var(--card); color: var(--text); border: 2px solid var(--border);
    padding: 7px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.15s;
  }
  .spec-filters button:hover { background: var(--card-hover); }
  .spec-filters button.active-all { border-color: var(--gold); color: var(--gold); }
  .spec-filters button.active-bear { border-color: #60a5fa; color: #60a5fa; }
  .spec-filters button.active-cat { border-color: #fb923c; color: #fb923c; }
  .spec-filters button.active-resto { border-color: #4ade80; color: #4ade80; }
  .slot-section { margin-bottom: 16px; }
  .slot-header {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px 8px 0 0;
    cursor: pointer; user-select: none;
  }
  .slot-header:hover { background: var(--card-hover); }
  .slot-header .arrow { transition: transform 0.2s; font-size: 0.7em; color: var(--text-dim); }
  .slot-header .arrow.open { transform: rotate(90deg); }
  .slot-header .slot-name { font-weight: 600; color: var(--orange); }
  .slot-header .slot-progress { margin-left: auto; font-size: 0.8em; color: var(--text-dim); }
  .slot-header .slot-progress.done { color: var(--green); }
  .slot-items { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .item-row {
    display: grid; grid-template-columns: 30px 24px 1fr auto;
    align-items: center; padding: 8px 12px; gap: 8px;
    border-bottom: 1px solid #0a0a1a; transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--card-hover); }
  .item-row.checked { background: var(--checked-bg); border-color: var(--checked-border); }
  .item-row.checked .item-name { text-decoration: line-through; opacity: 0.5; }
  .item-row.checked .item-details { opacity: 0.4; }
  .item-row.slot-done { opacity: 0.35; }
  .item-row.slot-done:hover { opacity: 0.7; }
  .rank { font-weight: 700; font-size: 0.85em; text-align: center; color: var(--text-dim); }
  .rank.r1 { color: var(--gold); font-size: 1.1em; }
  .rank.r2 { color: #c0c0c0; font-size: 1.0em; }
  .rank.r3 { color: #cd7f32; font-size: 0.9em; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
  .item-info { min-width: 0; }
  .item-name { font-weight: 600; font-size: 0.9em; transition: opacity 0.2s; }
  .item-name a { color: inherit; text-decoration: none; pointer-events: auto; }
  .item-name a:hover { text-decoration: underline; }
  .quality-epic { color: var(--epic); }
  .quality-rare { color: var(--rare); }
  .quality-uncommon { color: var(--uncommon); }
  .item-source { font-size: 0.75em; color: var(--text-dim); margin-top: 2px; }
  .item-details { text-align: right; font-size: 0.75em; white-space: nowrap; transition: opacity 0.2s; }
  .stats { color: var(--blue); }
  .tag {
    display: inline-block; font-size: 0.6em; padding: 1px 5px; border-radius: 3px;
    margin-left: 3px; vertical-align: middle; font-weight: 700; letter-spacing: 0.3px;
  }
  .tag-bear { background: #1e3a5f; color: #93c5fd; }
  .tag-cat  { background: #5a2d0c; color: #fdba74; }
  .tag-resto { background: #14532d; color: #86efac; }
  .tag-bis  { background: #1b4a1b; color: #86efac; }
  .tag-pvp  { background: #4a1a4a; color: #d8b4fe; }
  .tag-craft { background: #5a3a1a; color: #fbbf24; }
  .prio-badge {
    display: inline-block; font-size: 0.7em; padding: 2px 8px; border-radius: 4px;
    font-weight: 700; margin-left: 8px; vertical-align: middle;
  }
  .prio-1 { background: #ffd700; color: #1a1a2e; }
  .prio-2 { background: #60a5fa; color: #1a1a2e; }
  .prio-3 { background: #a78bfa; color: #1a1a2e; }
  .prio-4 { background: #475569; color: #cbd5e1; }
  .prio-reason { font-size: 0.7em; color: var(--text-dim); margin-left: 6px; font-weight: 400; }
  .dungeon-header .prio-badge { font-size: 0.65em; }
  .farm-section { margin-bottom: 20px; }
  .farm-tier-header {
    padding: 10px 14px; font-weight: 700; font-size: 0.95em; border-radius: 8px;
    margin-bottom: 8px;
  }
  .farm-tier-1 { background: linear-gradient(90deg, #433500, #1a1a2e); color: #ffd700; border: 1px solid #665200; }
  .farm-tier-2 { background: linear-gradient(90deg, #1a2d4a, #1a1a2e); color: #60a5fa; border: 1px solid #2a4a7a; }
  .farm-tier-3 { background: linear-gradient(90deg, #2d1a4a, #1a1a2e); color: #a78bfa; border: 1px solid #4a2a7a; }
  .farm-tier-4 { background: linear-gradient(90deg, #1e293b, #1a1a2e); color: #94a3b8; border: 1px solid #334155; }
  .item-prio {
    display: inline-block; font-size: 0.6em; padding: 0px 4px; border-radius: 3px;
    margin-left: 3px; vertical-align: middle; font-weight: 700;
  }
  .item-prio-1 { background: #433500; color: #ffd700; }
  .item-prio-2 { background: #1a2d4a; color: #60a5fa; }
  .item-prio-3 { background: #2d1a4a; color: #a78bfa; }
  .item-prio-4 { background: #1e293b; color: #94a3b8; }
  .item-row.heroic-dim { opacity: 0.4; }
  .item-row.heroic-dim:hover { opacity: 0.7; }
  .heroic-label {
    display: inline-block; font-size: 0.6em; padding: 1px 5px; border-radius: 3px;
    margin-left: 3px; vertical-align: middle; font-weight: 700;
    background: #4a1a1a; color: #f87171;
  }
  .normal-label {
    display: inline-block; font-size: 0.6em; padding: 1px 5px; border-radius: 3px;
    margin-left: 3px; vertical-align: middle; font-weight: 700;
    background: #1a3a1a; color: #86efac;
  }
  .farm-phase-header {
    text-align: center; padding: 12px; margin: 20px 0 12px; font-weight: 700;
    font-size: 1.05em; border-radius: 8px;
  }
  .farm-phase-1 { background: #1a3a1a; color: #86efac; border: 1px solid #2a5a2a; }
  .farm-phase-quest { background: #2a2a1a; color: #fbbf24; border: 1px solid #4a4a2a; }
  .farm-phase-2 { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
  .quest-zone-badge {
    display: inline-block; font-size: 0.65em; padding: 2px 8px; border-radius: 4px;
    font-weight: 700; margin-left: 8px; background: #4a3a0a; color: #fbbf24;
  }
  .view-toggle { text-align: center; margin-bottom: 16px; }
  .view-toggle button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 16px; cursor: pointer; font-size: 0.8em;
  }
  .view-toggle button:first-child { border-radius: 6px 0 0 6px; }
  .view-toggle button:last-child { border-radius: 0 6px 6px 0; }
  .view-toggle button.active { border-color: var(--gold); color: var(--gold); }
  .dungeon-section { margin-bottom: 12px; }
  .dungeon-header {
    padding: 8px 12px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px 8px 0 0; font-weight: 600; color: var(--orange);
    display: flex; justify-content: space-between;
  }
  .dungeon-header .dungeon-progress { font-weight: 400; font-size: 0.85em; color: var(--text-dim); }
  .dungeon-header .dungeon-progress.done { color: var(--green); }
  .dungeon-items { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .reset-btn {
    display: block; margin: 30px auto 10px; background: transparent; color: #ef4444;
    border: 1px solid #ef4444; padding: 6px 20px; border-radius: 6px; cursor: pointer; font-size: 0.8em;
  }
  .reset-btn:hover { background: #2a0a0a; }
  .hidden { display: none; }
</style>

const SLOT_ORDER = ["Head","Neck","Shoulders","Back","Chest","Wrist","Hands","Waist","Legs","Feet","Ring","Trinket","Two-Hand","Main Hand","Off-Hand","Idol"];
const STORAGE_KEY = "bis-tracker-druid-all-checked";

function getSourceType(item) {
  if (item.dungeon) return "dungeon";
  const s = item.source.toLowerCase();
  if (s.startsWith("quest")) return "quest";
  if (s.startsWith("crafted")) return "crafted";
  if (s.includes("world drop") || s.includes("boe")) return "boe";
  if (s.includes("badge of justice")) return "badges";
  if (s.includes("honor") || s.includes("marks") || s.includes("arena")) return "pvp";
  if (s.includes("exalted") || s.includes("revered") || s.includes("honored")) return "reputation";
  return "other";
}

function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function save(st) { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); }

let state = load();
let currentView = "farm";
let activeFilter = "all";
let activeSpec = "all";

function itemKey(item) { return item.name; }
function isChecked(item) { return !!state[itemKey(item)]; }
function toggle(item) { const k = itemKey(item); if (state[k]) delete state[k]; else state[k] = true; save(state); render(); }
function resetAll() { if (!confirm("Reset all progress?")) return; state = {}; save(state); render(); }

function setView(v) {
  currentView = v;
  ["farm","slot","dungeon","enchants","gems"].forEach(id => {
    document.getElementById("view-" + id).classList.toggle("active", v === id);
    const elId = id === "enchants" ? "enchant-view" : id === "gems" ? "gem-view" : id + "-view";
    document.getElementById(elId).classList.toggle("hidden", v !== id);
  });
  document.getElementById("filters").classList.toggle("hidden", v === "enchants" || v === "gems" || v === "farm");
}

function setSpec(s) {
  activeSpec = s;
  document.querySelectorAll(".spec-filters button").forEach(b => {
    const bs = b.dataset.spec;
    b.className = bs === s ? (s === "all" ? "active-all" : "active-" + s) : "";
  });
  render();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filters button").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
  render();
}

function specMatch(item) {
  if (activeSpec === "all") return true;
  return item.specs.includes(activeSpec);
}

function slotHasChecked(slot, list) { return list.some(i => i.slot === slot && isChecked(i)); }

function specTags(item) {
  return (item.specs || []).map(s => {
    const labels = {bear:"\u{1F43B} Bear", cat:"\u{1F431} Cat", resto:"\u{1F33F} Resto"};
    return `<span class="tag tag-${s}">${labels[s]}</span>`;
  }).join("");
}

function getDungeonPrio(item) {
  if (!item.dungeon || !DUNGEON_PRIO[item.dungeon]) return null;
  return DUNGEON_PRIO[item.dungeon];
}

function makeItemRow(item, list) {
  const checked = isChecked(item);
  const dimmed = !checked && slotHasChecked(item.slot, list);
  const row = document.createElement("div");
  row.className = "item-row" + (checked ? " checked" : "") + (dimmed ? " slot-done" : "");
  const rc = item.rank <= 3 ? ` r${item.rank}` : "";
  const rl = item.rank <= 3 ? "\u2605" : `#${item.rank}`;
  let tags = specTags(item);
  if (item.tags.includes("bis")) tags += '<span class="tag tag-bis">BiS</span>';
  if (item.tags.includes("craft")) tags += '<span class="tag tag-craft">Craft</span>';
  if (item.tags.includes("pvp")) tags += '<span class="tag tag-pvp">PvP</span>';
  const prio = getDungeonPrio(item);
  if (prio) tags += `<span class="item-prio item-prio-${prio.tier}">#${prio.order}</span>`;

  row.innerHTML = `
    <span class="rank${rc}">${rl}</span>
    <input type="checkbox" ${checked ? "checked" : ""}>
    <div class="item-info">
      <div class="item-name quality-${item.quality}"><a href="https://www.wowhead.com/tbc/item=${item.wowheadId}" target="_blank" rel="noopener">${item.name}</a>${tags}</div>
      <div class="item-source">${item.source}${item.note ? " &mdash; <em>" + item.note + "</em>" : ""}</div>
    </div>
    <div class="item-details"><div class="stats">${item.stats}</div></div>
  `;
  row.querySelector("input").addEventListener("change", () => toggle(item));
  return row;
}

function filterItems(items) {
  let f = items.filter(specMatch);
  if (activeFilter === "dungeon") f = f.filter(i => i.dungeon);
  else if (activeFilter === "normal") f = f.filter(i => i.difficulty === "Normal");
  else if (activeFilter === "heroic") f = f.filter(i => i.difficulty === "Heroic");
  else if (activeFilter === "nondungeon") f = f.filter(i => !i.dungeon);
  else if (activeFilter === "quest") f = f.filter(i => getSourceType(i) === "quest");
  else if (activeFilter === "reputation") f = f.filter(i => getSourceType(i) === "reputation");
  else if (activeFilter === "boe") f = f.filter(i => getSourceType(i) === "boe");
  else if (activeFilter === "crafted") f = f.filter(i => getSourceType(i) === "crafted");
  else if (activeFilter === "badges") f = f.filter(i => getSourceType(i) === "badges");
  else if (activeFilter === "pvp") f = f.filter(i => getSourceType(i) === "pvp");
  else if (activeFilter === "unchecked") f = f.filter(i => !isChecked(i));
  return f;
}

function renderSlotView() {
  const c = document.getElementById("slot-view"); c.innerHTML = "";
  for (const slot of SLOT_ORDER) {
    const items = filterItems(ITEMS.filter(i => i.slot === slot));
    if (!items.length) continue;
    const cc = items.filter(isChecked).length;
    const sec = document.createElement("div"); sec.className = "slot-section";
    const hdr = document.createElement("div"); hdr.className = "slot-header";
    hdr.innerHTML = `<span class="arrow open">&#9654;</span><span class="slot-name">${slot}</span><span class="slot-progress${cc === items.length && cc > 0 ? " done" : ""}">${cc}/${items.length}</span>`;
    const div = document.createElement("div"); div.className = "slot-items";
    items.forEach(i => div.appendChild(makeItemRow(i, items)));
    hdr.addEventListener("click", () => { const o = hdr.querySelector(".arrow").classList.toggle("open"); div.classList.toggle("hidden", !o); });
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }
}

function makeFarmItemRow(item, list) {
  const row = makeItemRow(item, list);
  const isHeroic = item.difficulty === "Heroic";
  if (isHeroic) row.classList.add("heroic-dim");
  // Inject difficulty label after the tags
  const nameEl = row.querySelector(".item-name");
  if (nameEl) {
    if (isHeroic) nameEl.insertAdjacentHTML("beforeend", '<span class="heroic-label">HEROIC</span>');
    else if (item.dungeon) nameEl.insertAdjacentHTML("beforeend", '<span class="normal-label">NORMAL</span>');
  }
  return row;
}

function renderFarmDungeonBlock(c, dungeons, phase) {
  const allDungeons = Object.entries(DUNGEON_PRIO).sort((a,b) => a[1].order - b[1].order);

  for (const tierDef of PRIO_TIERS) {
    const tierDungeons = allDungeons.filter(([,p]) => p.tier === tierDef.tier);
    if (!tierDungeons.length) continue;

    // Filter items per phase
    const tierItems = tierDungeons.flatMap(([dName]) =>
      ITEMS.filter(i => i.dungeon === dName).filter(specMatch)
        .filter(i => phase === "normal" ? i.difficulty === "Normal" : i.difficulty === "Heroic")
    );
    if (!tierItems.length) continue;

    const tierHeader = document.createElement("div");
    tierHeader.className = "farm-tier-header " + tierDef.css;
    tierHeader.textContent = tierDef.label;
    c.appendChild(tierHeader);

    for (const [dName, prio] of tierDungeons) {
      const items = ITEMS.filter(i => i.dungeon === dName).filter(specMatch)
        .filter(i => phase === "normal" ? i.difficulty === "Normal" : i.difficulty === "Heroic");
      if (!items.length) continue;
      const cc = items.filter(isChecked).length;
      const allDone = cc === items.length;

      const sec = document.createElement("div"); sec.className = "dungeon-section";
      const hdr = document.createElement("div"); hdr.className = "dungeon-header";
      hdr.innerHTML = `
        <span>
          <span class="prio-badge prio-${prio.tier}">#${prio.order}</span>
          ${dName}
          <span class="prio-reason">${prio.reason}</span>
        </span>
        <span class="dungeon-progress${allDone ? " done" : ""}">${cc}/${items.length}</span>
      `;

      const div = document.createElement("div"); div.className = "dungeon-items";
      items.forEach(i => div.appendChild(makeFarmItemRow(i, items)));
      sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
    }
  }
}

function renderFarmView() {
  const c = document.getElementById("farm-view"); c.innerHTML = "";

  // Phase 1: Normal dungeons
  const ph1 = document.createElement("div");
  ph1.className = "farm-phase-header farm-phase-1";
  ph1.textContent = "Phase 1 — Normal Dungeons (start here)";
  c.appendChild(ph1);

  renderFarmDungeonBlock(c, DUNGEON_PRIO, "normal");

  // Quest rewards by zone
  const phQ = document.createElement("div");
  phQ.className = "farm-phase-header farm-phase-quest";
  phQ.textContent = "Quests — Free Gear Between Runs";
  c.appendChild(phQ);

  for (const qz of QUEST_ZONES) {
    const questItems = ITEMS.filter(i => !i.dungeon && i.source.startsWith("Quest")).filter(specMatch)
      .filter(i => qz.quests.some(q => i.source.includes(q.replace("Quest — ", ""))));
    if (!questItems.length) continue;
    const cc = questItems.filter(isChecked).length;
    const allDone = cc === questItems.length;
    const sec = document.createElement("div"); sec.className = "dungeon-section";
    const hdr = document.createElement("div"); hdr.className = "dungeon-header";
    hdr.innerHTML = `
      <span>
        <span class="quest-zone-badge">#${qz.order}</span>
        ${qz.zone}
        <span class="prio-reason">${qz.reason}</span>
      </span>
      <span class="dungeon-progress${allDone ? " done" : ""}">${cc}/${questItems.length}</span>
    `;
    const div = document.createElement("div"); div.className = "dungeon-items";
    questItems.forEach(i => div.appendChild(makeItemRow(i, questItems)));
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }

  // Crafted, Rep, Badges — grouped by category
  const NON_DUNGEON_GROUPS = [
    {key:"badges", label:"Badge of Justice", icon:"#B", match: i => i.source.includes("Badge of Justice")},
    {key:"rep-ce", label:"Cenarion Expedition", icon:"CE", match: i => i.source.includes("Cenarion Expedition")},
    {key:"rep-lc", label:"Lower City", icon:"LC", match: i => i.source.includes("Lower City")},
    {key:"rep-kot", label:"Keepers of Time", icon:"KoT", match: i => i.source.includes("Keepers of Time")},
    {key:"rep-sha", label:"Sha'tar", icon:"Sha", match: i => i.source.includes("Sha'tar")},
    {key:"rep-con", label:"Consortium", icon:"Con", match: i => i.source.includes("Consortium")},
    {key:"rep-ogr", label:"Ogri'la", icon:"Ogr", match: i => i.source.includes("Ogri'la")},
    {key:"craft-lw", label:"Leatherworking", icon:"LW", match: i => i.source.includes("Crafted") && (i.source.includes("LW") || i.source.includes("Tribal"))},
    {key:"craft-tailor", label:"Tailoring", icon:"TL", match: i => i.source.includes("Crafted") && i.source.includes("Tailoring")},
    {key:"craft-other", label:"Other Crafted (JC, BS, Eng)", icon:"CR", match: i => i.source.includes("Crafted") && !i.source.includes("LW") && !i.source.includes("Tribal") && !i.source.includes("Tailoring")},
    {key:"pvp", label:"PvP Honor Gear", icon:"PvP", match: i => i.source.includes("Honor")},
    {key:"boe", label:"World Drop BoE", icon:"$", match: i => i.source.includes("World drop")},
  ];

  const nonDungeonItems = ITEMS.filter(i => !i.dungeon && !i.source.startsWith("Quest")).filter(specMatch);

  const craftRepHeader = document.createElement("div");
  craftRepHeader.className = "farm-tier-header farm-tier-2";
  craftRepHeader.textContent = "Crafted, Reputation & Badges";
  c.appendChild(craftRepHeader);

  const placed = new Set();
  for (const grp of NON_DUNGEON_GROUPS) {
    const items = nonDungeonItems.filter(i => !placed.has(itemKey(i)) && grp.match(i));
    if (!items.length) continue;
    items.forEach(i => placed.add(itemKey(i)));
    const cc = items.filter(isChecked).length;
    const allDone = cc === items.length;
    const sec = document.createElement("div"); sec.className = "dungeon-section";
    const hdr = document.createElement("div"); hdr.className = "dungeon-header";
    hdr.innerHTML = `
      <span>
        <span class="quest-zone-badge">${grp.icon}</span>
        ${grp.label}
      </span>
      <span class="dungeon-progress${allDone ? " done" : ""}">${cc}/${items.length}</span>
    `;
    const div = document.createElement("div"); div.className = "dungeon-items";
    items.forEach(i => div.appendChild(makeItemRow(i, items)));
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }

  // Catch any ungrouped non-dungeon non-quest items
  const remaining = nonDungeonItems.filter(i => !placed.has(itemKey(i)));
  if (remaining.length) {
    const sec = document.createElement("div"); sec.className = "dungeon-section";
    const hdr = document.createElement("div"); hdr.className = "dungeon-header";
    const cc = remaining.filter(isChecked).length;
    hdr.innerHTML = `<span>Other</span><span class="dungeon-progress">${cc}/${remaining.length}</span>`;
    const div = document.createElement("div"); div.className = "dungeon-items";
    remaining.forEach(i => div.appendChild(makeItemRow(i, remaining)));
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }

  // Phase 2: Heroic dungeons
  const ph2 = document.createElement("div");
  ph2.className = "farm-phase-header farm-phase-2";
  ph2.textContent = "Phase 2 — Heroic Dungeons (once geared from normals)";
  c.appendChild(ph2);

  renderFarmDungeonBlock(c, DUNGEON_PRIO, "heroic");
}

function renderDungeonView() {
  const c = document.getElementById("dungeon-view"); c.innerHTML = "";
  const filtered = filterItems(ITEMS.filter(i => i.dungeon));
  const dungeons = {};
  filtered.forEach(i => { if (!dungeons[i.dungeon]) dungeons[i.dungeon] = []; dungeons[i.dungeon].push(i); });
  const order = Object.entries(DUNGEON_PRIO).sort((a,b) => a[1].order - b[1].order).map(([n]) => n);
  // Also include dungeons not in prio list
  Object.keys(dungeons).forEach(d => { if (!order.includes(d)) order.push(d); });
  for (const d of order) {
    const items = dungeons[d]; if (!items) continue;
    const cc = items.filter(isChecked).length;
    const sec = document.createElement("div"); sec.className = "dungeon-section";
    const hdr = document.createElement("div"); hdr.className = "dungeon-header";
    const diffs = [...new Set(items.map(i => i.difficulty))].join(" + ");
    const prio = DUNGEON_PRIO[d];
    const prioBadge = prio ? `<span class="prio-badge prio-${prio.tier}">#${prio.order}</span> ` : "";
    hdr.innerHTML = `<span>${prioBadge}${d} <span style="color:var(--text-dim);font-weight:400;font-size:0.85em">(${diffs})</span></span><span class="dungeon-progress${cc === items.length ? " done" : ""}">${cc}/${items.length}</span>`;
    const div = document.createElement("div"); div.className = "dungeon-items";
    items.forEach(i => div.appendChild(makeItemRow(i, items)));
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }
}

function makeEnchGemRow(item, list, urlFn) {
  const checked = isChecked(item);
  const sd = !checked && list.some(e => e.slot === item.slot && isChecked(e));
  const row = document.createElement("div");
  row.className = "item-row" + (checked ? " checked" : "") + (sd ? " slot-done" : "");
  const rc = item.rank <= 3 ? ` r${item.rank}` : "";
  const rl = item.rank <= 3 ? "\u2605" : `#${item.rank}`;
  let tags = specTags(item);
  row.innerHTML = `
    <span class="rank${rc}">${rl}</span>
    <input type="checkbox" ${checked ? "checked" : ""}>
    <div class="item-info">
      <div class="item-name quality-${item.quality}"><a href="${urlFn(item)}" target="_blank" rel="noopener">${item.name}</a>${tags}</div>
      <div class="item-source">${item.source}${item.note ? " &mdash; <em>" + item.note + "</em>" : ""}</div>
    </div>
    <div class="item-details"><div class="stats">${item.stats}</div></div>
  `;
  row.querySelector("input").addEventListener("change", () => toggle(item));
  return row;
}

function renderEnchantView() {
  const c = document.getElementById("enchant-view"); c.innerHTML = "";
  for (const slot of ENCHANT_SLOT_ORDER) {
    const enchs = ENCHANTS.filter(e => e.slot === slot).filter(specMatch);
    if (!enchs.length) continue;
    const cc = enchs.filter(isChecked).length;
    const sec = document.createElement("div"); sec.className = "slot-section";
    const hdr = document.createElement("div"); hdr.className = "slot-header";
    hdr.innerHTML = `<span class="arrow open">&#9654;</span><span class="slot-name">${slot}</span><span class="slot-progress${cc > 0 ? " done" : ""}">${cc}/${enchs.length}</span>`;
    const div = document.createElement("div"); div.className = "slot-items";
    enchs.forEach(e => div.appendChild(makeEnchGemRow(e, enchs, i => i.isSpell ? `https://www.wowhead.com/tbc/spell=${i.wowheadId}` : `https://www.wowhead.com/tbc/item=${i.wowheadId}`)));
    hdr.addEventListener("click", () => { const o = hdr.querySelector(".arrow").classList.toggle("open"); div.classList.toggle("hidden", !o); });
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }
}

function renderGemView() {
  const c = document.getElementById("gem-view"); c.innerHTML = "";
  for (const slot of GEM_SLOT_ORDER) {
    const gems = GEMS.filter(g => g.slot === slot).filter(specMatch);
    if (!gems.length) continue;
    const cc = gems.filter(isChecked).length;
    const sec = document.createElement("div"); sec.className = "slot-section";
    const hdr = document.createElement("div"); hdr.className = "slot-header";
    hdr.innerHTML = `<span class="arrow open">&#9654;</span><span class="slot-name">${slot}</span><span class="slot-progress${cc > 0 ? " done" : ""}">${cc}/${gems.length}</span>`;
    const div = document.createElement("div"); div.className = "slot-items";
    gems.forEach(g => div.appendChild(makeEnchGemRow(g, gems, i => `https://www.wowhead.com/tbc/item=${i.wowheadId}`)));
    hdr.addEventListener("click", () => { const o = hdr.querySelector(".arrow").classList.toggle("open"); div.classList.toggle("hidden", !o); });
    sec.appendChild(hdr); sec.appendChild(div); c.appendChild(sec);
  }
}

function updateProgress() {
  const all = [...ITEMS, ...ENCHANTS, ...GEMS].filter(specMatch);
  const total = all.length, checked = all.filter(isChecked).length;
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progress-text").textContent = `${checked} / ${total} items (${pct}%)`;
  document.getElementById("progress-fill").style.width = pct + "%";
}

function render() { renderFarmView(); renderSlotView(); renderDungeonView(); renderEnchantView(); renderGemView(); updateProgress(); if (typeof $WowheadPower !== "undefined") $WowheadPower.refreshLinks(); }

// Filters
const fd = document.getElementById("filters");
[["all","All"],["dungeon","Dungeon"],["normal","Normal"],["heroic","Heroic"],["nondungeon","Non-Dungeon"],["quest","Quest"],["reputation","Reputation"],["crafted","Crafted"],["badges","Badges"],["pvp","PvP"],["unchecked","Missing"]].forEach(([k, l]) => {
  const b = document.createElement("button"); b.textContent = l; b.dataset.filter = k;
  if (k === "all") b.classList.add("active");
  b.addEventListener("click", () => setFilter(k)); fd.appendChild(b);
});

render();
</script>
</body>
</html>
