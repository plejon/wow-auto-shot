<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BM Hunter Pre-Raid BiS Tracker</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card-hover: #1a2745;
    --border: #0f3460;
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --gold: #ffd700;
    --green: #4caf50;
    --blue: #5090d0;
    --purple: #a855f7;
    --epic: #a335ee;
    --rare: #0070dd;
    --uncommon: #1eff00;
    --checked-bg: #0d2a1a;
    --checked-border: #1b5e20;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    color: var(--gold);
    margin-bottom: 4px;
    font-size: 1.6em;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 20px;
    font-size: 0.85em;
  }
  .progress-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    text-align: center;
  }
  .progress-bar .bar-wrap {
    background: #0a0a1a;
    border-radius: 4px;
    height: 20px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-bar .bar-fill {
    background: linear-gradient(90deg, var(--green), #66bb6a);
    height: 100%;
    transition: width 0.3s;
    border-radius: 4px;
  }
  .progress-text { color: var(--gold); font-weight: 600; }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    justify-content: center;
  }
  .filters button {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8em;
    transition: all 0.15s;
  }
  .filters button:hover { background: var(--card-hover); }
  .filters button.active { border-color: var(--gold); color: var(--gold); }
  .slot-section {
    margin-bottom: 16px;
  }
  .slot-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    user-select: none;
  }
  .slot-header:hover { background: var(--card-hover); }
  .slot-header .arrow { transition: transform 0.2s; font-size: 0.7em; color: var(--text-dim); }
  .slot-header .arrow.open { transform: rotate(90deg); }
  .slot-header .slot-name { font-weight: 600; color: var(--gold); }
  .slot-header .slot-progress { margin-left: auto; font-size: 0.8em; color: var(--text-dim); }
  .slot-header .slot-progress.done { color: var(--green); }
  .slot-items {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .item-row {
    display: grid;
    grid-template-columns: 30px 24px 1fr auto;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    border-bottom: 1px solid #0a0a1a;
    transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--card-hover); }
  .item-row.checked { background: var(--checked-bg); border-color: var(--checked-border); }
  .item-row.checked .item-name { text-decoration: line-through; opacity: 0.5; }
  .item-row.checked .item-details { opacity: 0.4; }
  .item-row.slot-done { opacity: 0.35; }
  .item-row.slot-done:hover { opacity: 0.7; }
  .rank {
    font-weight: 700;
    font-size: 0.85em;
    text-align: center;
    color: var(--text-dim);
  }
  .rank.r1 { color: var(--gold); font-size: 1.1em; }
  .rank.r2 { color: #c0c0c0; font-size: 1.0em; }
  .rank.r3 { color: #cd7f32; font-size: 0.9em; }
  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--green);
    cursor: pointer;
  }
  .item-info { min-width: 0; }
  .item-name {
    font-weight: 600;
    font-size: 0.9em;
    transition: opacity 0.2s;
  }
  .item-name a { color: inherit; text-decoration: none; }
  .item-name a:hover { text-decoration: underline; }
  .quality-epic { color: var(--epic); }
  .quality-rare { color: var(--rare); }
  .quality-uncommon { color: var(--uncommon); }
  .item-source {
    font-size: 0.75em;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .item-details {
    text-align: right;
    font-size: 0.75em;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .stats { color: var(--blue); }
  .score { color: var(--text-dim); }
  .tag {
    display: inline-block;
    font-size: 0.65em;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .tag-set { background: #4a1a6b; color: #d8b4fe; }
  .tag-bis { background: #1b4a1b; color: #86efac; }
  .tag-leather { background: #5a3a1a; color: #fbbf24; }
  .tag-phase { background: #1a3a5a; color: #7dd3fc; }
  .view-toggle {
    text-align: center;
    margin-bottom: 16px;
  }
  .view-toggle button {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 16px;
    cursor: pointer;
    font-size: 0.8em;
  }
  .view-toggle button:first-child { border-radius: 6px 0 0 6px; }
  .view-toggle button:last-child { border-radius: 0 6px 6px 0; }
  .view-toggle button.active { border-color: var(--gold); color: var(--gold); }
  .dungeon-section { margin-bottom: 12px; }
  .dungeon-header {
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    font-weight: 600;
    color: var(--gold);
    display: flex;
    justify-content: space-between;
  }
  .dungeon-header .dungeon-progress { font-weight: 400; font-size: 0.85em; color: var(--text-dim); }
  .dungeon-header .dungeon-progress.done { color: var(--green); }
  .dungeon-items {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .reset-btn {
    display: block;
    margin: 30px auto 10px;
    background: transparent;
    color: #ef4444;
    border: 1px solid #ef4444;
    padding: 6px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8em;
  }
  .reset-btn:hover { background: #2a0a0a; }
  .hidden { display: none; }
  .item-name a { pointer-events: auto; }
</style>

const SLOT_ORDER = ["Head","Neck","Shoulders","Back","Chest","Wrist","Hands","Waist","Legs","Feet","Ring","Trinket","Main Hand","Off-Hand","Two-Hand","Ranged"];

function getSourceType(item) {
  if (item.dungeon) return "dungeon";
  const s = item.source.toLowerCase();
  if (s.startsWith("quest")) return "quest";
  if (s.startsWith("crafted")) return "crafted";
  if (s.includes("world drop") || s.includes("boe")) return "boe";
  if (s.includes("badge of justice")) return "badges";
  if (s.includes("exalted") || s.includes("revered") || s.includes("honored")) return "reputation";
  return "other";
}

const STORAGE_KEY = "bis-tracker-checked";

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function save(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = load();
let currentView = "slot";
let activeFilter = "all";

function itemKey(item) { return item.name; }

function isChecked(item) { return !!state[itemKey(item)]; }

function toggle(item) {
  const k = itemKey(item);
  if (state[k]) delete state[k]; else state[k] = true;
  save(state);
  render();
}

function resetAll() {
  if (!confirm("Reset all progress?")) return;
  state = {};
  save(state);
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById("view-slot").classList.toggle("active", v === "slot");
  document.getElementById("view-dungeon").classList.toggle("active", v === "dungeon");
  document.getElementById("view-enchants").classList.toggle("active", v === "enchants");
  document.getElementById("view-gems").classList.toggle("active", v === "gems");
  document.getElementById("slot-view").classList.toggle("hidden", v !== "slot");
  document.getElementById("dungeon-view").classList.toggle("hidden", v !== "dungeon");
  document.getElementById("enchant-view").classList.toggle("hidden", v !== "enchants");
  document.getElementById("gem-view").classList.toggle("hidden", v !== "gems");
  document.getElementById("filters").classList.toggle("hidden", v === "enchants" || v === "gems");
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filters button").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
  render();
}

const DW_SLOTS = ["Main Hand", "Off-Hand"];
const TH_SLOT = "Two-Hand";

function has2H() { return ITEMS.some(i => i.slot === TH_SLOT && isChecked(i)); }
function hasDW() { return ITEMS.some(i => DW_SLOTS.includes(i.slot) && isChecked(i)); }

function slotHasChecked(slot) {
  return ITEMS.some(i => i.slot === slot && isChecked(i));
}

function isWeaponExcluded(item) {
  if (DW_SLOTS.includes(item.slot) && has2H()) return true;
  if (item.slot === TH_SLOT && hasDW()) return true;
  return false;
}

function makeItemRow(item) {
  const checked = isChecked(item);
  const excluded = isWeaponExcluded(item);
  const dimmed = !checked && (slotHasChecked(item.slot) || excluded);
  const row = document.createElement("div");
  row.className = "item-row" + (checked ? " checked" : "") + (dimmed ? " slot-done" : "");

  const rankClass = item.rank <= 3 ? ` r${item.rank}` : "";
  const rankLabel = item.rank === 1 ? "★" : item.rank === 2 ? "★" : item.rank === 3 ? "★" : `#${item.rank}`;
  let tags = "";
  if (item.tags.includes("set")) tags += '<span class="tag tag-set">SET</span>';
  if (item.tags.includes("bis")) tags += '<span class="tag tag-bis">BiS</span>';
  if (item.tags.includes("leather")) tags += '<span class="tag tag-leather">Leather</span>';

  row.innerHTML = `
    <span class="rank${rankClass}">${rankLabel}</span>
    <input type="checkbox" ${checked ? "checked" : ""}>
    <div class="item-info">
      <div class="item-name quality-${item.quality}"><a href="https://www.wowhead.com/tbc/item=${item.wowheadId}" target="_blank" rel="noopener">${item.name}</a>${tags}</div>
      <div class="item-source">${item.source}</div>
    </div>
    <div class="item-details">
      <div class="stats">${item.stats}</div>
      ${item.score ? `<div class="score">Score: ${item.score}</div>` : ""}
    </div>
  `;
  row.querySelector("input").addEventListener("change", () => toggle(item));
  return row;
}

function renderSlotView() {
  const container = document.getElementById("slot-view");
  container.innerHTML = "";

  for (const slot of SLOT_ORDER) {
    let items = ITEMS.filter(i => i.slot === slot);
    if (activeFilter === "dungeon") items = items.filter(i => i.dungeon);
    else if (activeFilter === "normal") items = items.filter(i => i.difficulty === "Normal");
    else if (activeFilter === "heroic") items = items.filter(i => i.difficulty === "Heroic");
    else if (activeFilter === "nondungeon") items = items.filter(i => !i.dungeon);
    else if (activeFilter === "quest") items = items.filter(i => getSourceType(i) === "quest");
    else if (activeFilter === "reputation") items = items.filter(i => getSourceType(i) === "reputation");
    else if (activeFilter === "boe") items = items.filter(i => getSourceType(i) === "boe");
    else if (activeFilter === "crafted") items = items.filter(i => getSourceType(i) === "crafted");
    else if (activeFilter === "badges") items = items.filter(i => getSourceType(i) === "badges");
    else if (activeFilter === "unchecked") items = items.filter(i => !isChecked(i));
    if (items.length === 0) continue;

    const checkedCount = items.filter(i => isChecked(i)).length;
    const section = document.createElement("div");
    section.className = "slot-section";

    const allDone = checkedCount > 0 && checkedCount === items.length;
    const header = document.createElement("div");
    header.className = "slot-header";
    header.innerHTML = `
      <span class="arrow open">&#9654;</span>
      <span class="slot-name">${slot}</span>
      <span class="slot-progress${allDone ? " done" : ""}">${checkedCount}/${items.length}</span>
    `;

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "slot-items";
    items.forEach(item => itemsDiv.appendChild(makeItemRow(item)));

    header.addEventListener("click", () => {
      const open = header.querySelector(".arrow").classList.toggle("open");
      itemsDiv.classList.toggle("hidden", !open);
    });

    section.appendChild(header);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  }
}

function renderDungeonView() {
  const container = document.getElementById("dungeon-view");
  container.innerHTML = "";

  let filtered = ITEMS.filter(i => i.dungeon);
  if (activeFilter === "normal") filtered = filtered.filter(i => i.difficulty === "Normal");
  else if (activeFilter === "heroic") filtered = filtered.filter(i => i.difficulty === "Heroic");
  else if (activeFilter === "unchecked") filtered = filtered.filter(i => !isChecked(i));

  const dungeons = {};
  filtered.forEach(item => {
    const key = item.dungeon;
    if (!dungeons[key]) dungeons[key] = [];
    dungeons[key].push(item);
  });

  const dungeonOrder = ["The Mechanar","The Steamvault","The Botanica","Shattered Halls","Old Hillsbrad","Shadow Labyrinth","Sethekk Halls","The Black Morass","Auchenai Crypts","Slave Pens","Underbog","Mana-Tombs"];

  for (const dName of dungeonOrder) {
    const items = dungeons[dName];
    if (!items) continue;
    const checkedCount = items.filter(i => isChecked(i)).length;
    const allDone = checkedCount === items.length;

    const section = document.createElement("div");
    section.className = "dungeon-section";

    const header = document.createElement("div");
    header.className = "dungeon-header";
    const difficulties = [...new Set(items.map(i => i.difficulty))].join(" + ");
    header.innerHTML = `
      <span>${dName} <span style="color:var(--text-dim);font-weight:400;font-size:0.85em">(${difficulties})</span></span>
      <span class="dungeon-progress${allDone ? " done" : ""}">${checkedCount}/${items.length}</span>
    `;

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "dungeon-items";
    items.forEach(item => itemsDiv.appendChild(makeItemRow(item)));

    section.appendChild(header);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  }
}

function isEnchantExcluded(ench) {
  if (ench.slot === "Melee 1H" && has2H()) return true;
  if (ench.slot === "Melee 2H" && hasDW()) return true;
  return false;
}

function makeEnchantRow(ench) {
  const checked = isChecked(ench);
  const excluded = isEnchantExcluded(ench);
  const slotDone = !checked && (ENCHANTS.some(e => e.slot === ench.slot && isChecked(e)) || excluded);
  const row = document.createElement("div");
  row.className = "item-row" + (checked ? " checked" : "") + (slotDone ? " slot-done" : "");

  const rankClass = ench.rank <= 3 ? ` r${ench.rank}` : "";
  const rankLabel = ench.rank === 1 ? "★" : ench.rank === 2 ? "★" : ench.rank === 3 ? "★" : `#${ench.rank}`;
  let tags = "";
  if (ench.tags.includes("bis")) tags += '<span class="tag tag-bis">BiS</span>';

  const url = ench.isSpell
    ? `https://www.wowhead.com/tbc/spell=${ench.wowheadId}`
    : `https://www.wowhead.com/tbc/item=${ench.wowheadId}`;

  row.innerHTML = `
    <span class="rank${rankClass}">${rankLabel}</span>
    <input type="checkbox" ${checked ? "checked" : ""}>
    <div class="item-info">
      <div class="item-name quality-${ench.quality}"><a href="${url}" target="_blank" rel="noopener">${ench.name}</a>${tags}</div>
      <div class="item-source">${ench.source}</div>
    </div>
    <div class="item-details">
      <div class="stats">${ench.stats}</div>
    </div>
  `;
  row.querySelector("input").addEventListener("change", () => toggle(ench));
  return row;
}

function renderEnchantView() {
  const container = document.getElementById("enchant-view");
  container.innerHTML = "";

  for (const slot of ENCHANT_SLOT_ORDER) {
    const enchants = ENCHANTS.filter(e => e.slot === slot);
    if (enchants.length === 0) continue;

    const checkedCount = enchants.filter(e => isChecked(e)).length;
    const section = document.createElement("div");
    section.className = "slot-section";

    const allDone = checkedCount > 0;
    const header = document.createElement("div");
    header.className = "slot-header";
    header.innerHTML = `
      <span class="arrow open">&#9654;</span>
      <span class="slot-name">${slot}</span>
      <span class="slot-progress${allDone ? " done" : ""}">${checkedCount}/${enchants.length}</span>
    `;

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "slot-items";
    enchants.forEach(e => itemsDiv.appendChild(makeEnchantRow(e)));

    header.addEventListener("click", () => {
      const open = header.querySelector(".arrow").classList.toggle("open");
      itemsDiv.classList.toggle("hidden", !open);
    });

    section.appendChild(header);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  }
}

function makeGemRow(gem) {
  const checked = isChecked(gem);
  const slotDone = !checked && GEMS.some(g => g.slot === gem.slot && isChecked(g));
  const row = document.createElement("div");
  row.className = "item-row" + (checked ? " checked" : "") + (slotDone ? " slot-done" : "");

  const rankClass = gem.rank <= 3 ? ` r${gem.rank}` : "";
  const rankLabel = gem.rank === 1 ? "★" : gem.rank === 2 ? "★" : gem.rank === 3 ? "★" : `#${gem.rank}`;
  let tags = "";
  if (gem.tags.includes("bis")) tags += '<span class="tag tag-bis">BiS</span>';
  for (const t of gem.tags) {
    if (t.startsWith("P")) tags += `<span class="tag tag-phase">${t}</span>`;
  }

  row.innerHTML = `
    <span class="rank${rankClass}">${rankLabel}</span>
    <input type="checkbox" ${checked ? "checked" : ""}>
    <div class="item-info">
      <div class="item-name quality-${gem.quality}"><a href="https://www.wowhead.com/tbc/item=${gem.wowheadId}" target="_blank" rel="noopener">${gem.name}</a>${tags}</div>
      <div class="item-source">${gem.source}${gem.note ? " — " + gem.note : ""}</div>
    </div>
    <div class="item-details">
      <div class="stats">${gem.stats}</div>
    </div>
  `;
  row.querySelector("input").addEventListener("change", () => toggle(gem));
  return row;
}

function renderGemView() {
  const container = document.getElementById("gem-view");
  container.innerHTML = "";

  for (const slot of GEM_SLOT_ORDER) {
    const gems = GEMS.filter(g => g.slot === slot);
    if (gems.length === 0) continue;

    const checkedCount = gems.filter(g => isChecked(g)).length;
    const section = document.createElement("div");
    section.className = "slot-section";

    const allDone = checkedCount > 0;
    const header = document.createElement("div");
    header.className = "slot-header";
    header.innerHTML = `
      <span class="arrow open">&#9654;</span>
      <span class="slot-name">${slot}</span>
      <span class="slot-progress${allDone ? " done" : ""}">${checkedCount}/${gems.length}</span>
    `;

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "slot-items";
    gems.forEach(g => itemsDiv.appendChild(makeGemRow(g)));

    header.addEventListener("click", () => {
      const open = header.querySelector(".arrow").classList.toggle("open");
      itemsDiv.classList.toggle("hidden", !open);
    });

    section.appendChild(header);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  }
}

function updateProgress() {
  const allItems = [...ITEMS, ...ENCHANTS, ...GEMS];
  const total = allItems.length;
  const checked = allItems.filter(i => isChecked(i)).length;
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progress-text").textContent = `${checked} / ${total} items (${pct}%)`;
  document.getElementById("progress-fill").style.width = pct + "%";
}

function render() {
  renderSlotView();
  renderDungeonView();
  renderEnchantView();
  renderGemView();
  updateProgress();
  // Re-scan DOM for new Wowhead links
  if (typeof $WowheadPower !== "undefined") $WowheadPower.refreshLinks();
}

// Build filters
const filtersDiv = document.getElementById("filters");
[["all","All"],["dungeon","Dungeon Only"],["normal","Normal"],["heroic","Heroic"],["nondungeon","Non-Dungeon"],["quest","Quest"],["reputation","Reputation"],["boe","BoE / World Drop"],["crafted","Crafted"],["badges","Badges"],["unchecked","Missing"]].forEach(([key, label]) => {
  const btn = document.createElement("button");
  btn.textContent = label;
  btn.dataset.filter = key;
  if (key === "all") btn.classList.add("active");
  btn.addEventListener("click", () => setFilter(key));
  filtersDiv.appendChild(btn);
});

render();
